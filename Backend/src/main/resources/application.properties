spring.config.import=optional:classpath:env.properties

server.port=6969
jwt.secret=${JWT_SECRET}

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${DB_SCHEMA_STRATEGY}
spring.jpa.show-sql=true

supabase.url=${SUPABASE_URL:https://your-project-ref.supabase.co}/
supabase.service-key=${SUPABASE_SERVICE_KEY:your-service-key}
stripe.secret-key=${STRIPE_SECRET_KEY}
fastapi.base-url=${FASTAPI_BASE_URL:http://localhost:8000}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
